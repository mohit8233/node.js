<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>User List</title>
</head>
<body>
  <h1>User Data</h1>
  <div id="users">Loading...</div>

  <script>
    fetch("/api/users")
      .then((res) => res.json())
      .then((data) => {
        const usersDiv = document.getElementById("users");
        usersDiv.innerHTML = "";

        data.forEach((user) => {
          usersDiv.innerHTML += `
            <div>
              <h3>${user.name}</h3>
              <p>${user.role}</p>
              <hr>
            </div>
          `;
        });
      })
      .catch((err) => {
        console.log(err);
        document.getElementById("users").innerText = "Data load nahi hua";
      });
  </script>
</body>
</html>
